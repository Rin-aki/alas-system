server {
    listen 80;
    server_name alasm.gjiang.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name alasm.gjiang.xyz;

    ssl_certificate     /etc/letsencrypt/live/alasm.gjiang.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alasm.gjiang.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── 公共代理头 ──────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Auth service（登录/注册/管理 API）──────────────────────────
    location ~ ^/(login|logout|register|auth|admin|purchase|reconnect|announcement|system|user)(/|$) {
        proxy_pass http://127.0.0.1:6200;
    }

    # ── Fix WebSocket（仍在 Python 后端）────────────────────────────
    location /fix {
        proxy_pass http://127.0.0.1:6200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Proxy service：设备控制（含 WebSocket /api/device/ws）───────
    location /api/device/ {
        proxy_pass http://127.0.0.1:6300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── Proxy service：ALAS 代理（HTTP + WebSocket）──────────────────
    location /alas {
        proxy_pass http://127.0.0.1:6300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── 前端 Vue SPA（兜底）────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:4173;
    }
}
