version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: alas-system-frontend/Dockerfile
      args:
        BACKEND_API_BASE_URL: "http://192.168.8.202:8000"
    ports:
      - "4173:4173"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
