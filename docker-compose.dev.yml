version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: alas-system-frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:6200}
        VITE_WS_FIX_URL: ${VITE_WS_FIX_URL:-ws://localhost:6200/fix}
        VITE_SCRCPY_BASE_URL: ${VITE_SCRCPY_BASE_URL:-http://localhost:6300/}
        VITE_ALAS_BASE_URL: ${VITE_ALAS_BASE_URL:-http://localhost:6300/}
    ports:
      - "4173:4173"
    depends_on:
      - auth-service
      - proxy-service
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: backend-springboot/Dockerfile
    ports:
      - "6200:6200"
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-lpfH5a3h78}
      - DB_URL=${DB_URL:-jdbc:mysql://10.10.10.1:3306/DataBase?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
      - DB_USER=${DB_USER:-guojiang}
      - DB_PASSWORD=${DB_PASSWORD:-lpfH5a3h78}
      - CORS_ALLOWED_ORIGIN_PATTERNS=${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*,http://10.10.10.*:*,https://10.10.10.*:*}
      - COOKIE_DOMAIN=
      - COOKIE_SECURE=false
      - DEFAULT_SERVER_IP=${DEFAULT_SERVER_IP:-227}
      - SSH_HOST_PREFIX=${SSH_HOST_PREFIX:-10.10.10.}
      - SSH_USER=${SSH_USER:-root}
      - SSH_PASSWORD=${SSH_PASSWORD:-lpfH5a3h78}
    restart: unless-stopped

  proxy-service:
    build:
      context: .
      dockerfile: backend/Dockerfile.proxy
    ports:
      - "6300:6300"
    volumes:
      - ./backend:/app
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=${PROXY_DATABASE_URL:-mysql+pymysql://guojiang:lpfH5a3h78@10.10.10.1:3306/DataBase}
      - USER_JWT_SECRET=${USER_JWT_SECRET:-lpfH5a3h78}
    restart: unless-stopped
    depends_on:
      - auth-service
