version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: alas-system-frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:6200}
        VITE_WS_FIX_URL: ${VITE_WS_FIX_URL:-ws://localhost:6200/fix}
        VITE_SCRCPY_BASE_URL: ${VITE_SCRCPY_BASE_URL:-http://localhost:6300/}
        VITE_ALAS_BASE_URL: ${VITE_ALAS_BASE_URL:-http://localhost:6300/}
    ports:
      - "4173:4173"
    depends_on:
      - auth-service
      - proxy-service
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: backend-springboot/Dockerfile
    ports:
      - "6200:6200"
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-lpfH5a3h78}
      - COOKIE_DOMAIN=
      - COOKIE_SECURE=false
    restart: unless-stopped

  proxy-service:
    build:
      context: .
      dockerfile: backend/Dockerfile.proxy
    ports:
      - "6300:6300"
    volumes:
      - ./backend:/app
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=${PROXY_DATABASE_URL:-mysql+pymysql://guojiang:lpfH5a3h78@10.10.10.1:3306/DataBase}
    restart: unless-stopped
    depends_on:
      - auth-service
